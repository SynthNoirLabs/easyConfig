name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: "Build & Release"
    strategy:
      matrix:
        platform: [linux/amd64, windows/amd64]
        include:
          - platform: linux/amd64
            os: ubuntu-latest
          - platform: windows/amd64
            os: ubuntu-latest # Cross-compile from Linux

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies (Linux)
        if: matrix.platform == 'linux/amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Dependencies (Windows Cross-Compile)
        if: matrix.platform == 'windows/amd64'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build Wails App
        uses: dAppServer/wails-build-action@v3
        id: build
        with:
          build-name: "easyConfig"
          build-platform: ${{ matrix.platform }}
          wails-version: "v2.11.0"
          go-version: "1.24"
          node-version: "18.x"
          package: true

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
