name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'coverage.out'
      - 'build/**'
      - 'frontend/dist/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'coverage.out'
      - 'build/**'
      - 'frontend/dist/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-mac:
    # Primary CI job: macOS self-hosted runner (default labels: self-hosted, macOS, ARM64).
    runs-on: [self-hosted, macOS, ARM64]
    defaults:
      run:
        shell: bash
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
    steps:
      - uses: actions/checkout@v4

      - name: Ensure dist exists for Go embed
        run: mkdir -p frontend/dist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go test
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers (mac self-hosted)
        run: |
          cd frontend
          # Skip reinstall if cached on the self-hosted runner
          if ls ~/.cache/ms-playwright/chromium-* >/dev/null 2>&1; then
            echo "Playwright chromium already present, skipping install"
          else
            npx playwright install --with-deps chromium
          fi

      - name: Frontend build (create dist for Go embed)
        run: |
          cd frontend
          npm run build
          touch dist/.keep

      - name: Frontend lint
        run: |
          cd frontend
          npm run lint

      - name: Playwright smoke
        run: |
          cd frontend
          npm run test:e2e

  build-and-test-ubuntu-smoke:
    # Lightweight hosted fallback / periodic check on ubuntu-latest.
    # You can disable or cron-gate this later if desired.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        shell: bash
    env:
      PLAYWRIGHT_BROWSERS_PATH: 0
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Go test (Ubuntu smoke)
        run: go test ./...
