name: Wails CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  # 1. Security & Dependencies
  dependency-review:
    name: "Dependency Review"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  # 2. Backend Quality
  test-backend:
    name: "Go Backend (Test & Lint)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          check-latest: true
          cache: true

      - name: Install Dependencies
        run: go mod tidy

      - name: Create Dummy Frontend Assets
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/index.html

      - name: Run Unit Tests with Coverage
        run: go test -v -race -coverprofile=coverage.out ./pkg/...

      - name: Check Code Coverage
        run: |
          # Extract total coverage percentage (e.g., "90.4%")
          COVERAGE_Output=$(go tool cover -func=coverage.out | grep total:)
          echo "$COVERAGE_Output"
          
          # Parse percentage number
          PERCENT=$(echo "$COVERAGE_Output" | awk '{print $3}' | sed 's/%//')
          
          echo "Coverage: ${PERCENT}%"
          
          # Compare using awk for float comparison
          if awk "BEGIN {exit !($PERCENT < 80)}"; then
            echo "Error: Code coverage ($PERCENT%) is below the 80% threshold."
            exit 1
          fi

      - name: Run Linter
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0' # Warning only for now to prevent build block
          severity: 'CRITICAL,HIGH'

  # 3. Frontend Quality
  test-frontend:
    name: "Frontend (Build & Typecheck)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Setup Biome
        uses: biomejs/setup-biome@v2

      - name: Run Biome (Lint)
        run: biome ci .

      - name: Type Check (TSC)
        run: npm run build

  # 4. Integration Tests
  test-integration:
    name: "Integration Tests (Docker)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Integration Tests
        run: |
          chmod +x scripts/run-integration.sh
          ./scripts/run-integration.sh

  # 5. Full Application Build
  build-app:
    name: "Build Wails Binary"
    needs: [test-backend, test-frontend, test-integration]
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'Linux'
            platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - name: 'Windows'
            platform: 'windows/amd64'
            os: 'windows-latest'
          - name: 'macOS'
            platform: 'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Wails App
        uses: dAppServer/wails-build-action@v3
        id: build
        with:
          build-name: 'easyConfig'
          build-platform: ${{ matrix.build.platform }}
          wails-version: 'v2.11.0'
          go-version: '1.24'
          node-version: '18.x'
          package: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.build.name }}-build
          path: build/bin/*