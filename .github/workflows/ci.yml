name: Wails CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  # 1. Backend Quality
  test-backend:
    name: "Go Backend (Test & Lint)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Install Dependencies
        run: go mod tidy

      - name: Create Dummy Frontend Assets
        run: |
          mkdir -p frontend/dist
          touch frontend/dist/index.html

      - name: Run Unit Tests
        run: go test -v -race ./pkg/...

      - name: Run Linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest

      - name: Vulnerability Check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # 2. Frontend Quality
  test-frontend:
    name: "Frontend (Build & Typecheck)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Type Check (TSC)
        # We run the build script which includes tsc
        run: npm run build

  # 3. Full Application Build
  build-app:
    name: "Build Wails Binary"
    needs: [test-backend, test-frontend]
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'Linux'
            platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - name: 'Windows'
            platform: 'windows/amd64'
            os: 'windows-latest'
          - name: 'macOS'
            platform: 'darwin/universal'
            os: 'macos-latest'

    runs-on: ${{ matrix.build.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Wails App
        uses: dAppServer/wails-build-action@v2.2
        id: build
        with:
          build-name: 'easyConfig'
          build-platform: ${{ matrix.build.platform }}
          wails-version: 'v2.9.2'
          go-version: '1.23'
          node-version: '18.x'
          package: true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}-build
          path: build/bin/*
