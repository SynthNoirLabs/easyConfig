name: Gemini Agent

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # 1. Automated PR Review
  # Runs on PR Open, Sync, Reopen, OR when label 'gemini-review' is added
  gemini-review:
    if: |
      (github.event_name == 'pull_request') && 
      (
        github.event.action == 'opened' || 
        github.event.action == 'synchronize' || 
        github.event.action == 'reopened' || 
        (github.event.action == 'labeled' && github.event.label.name == 'gemini-review')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gemini Code Review
        uses: google-github-actions/run-gemini-cli@v1
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          command: 'review'

  # 2. Automated Issue Triage
  # Runs on Issue Open OR when label 'gemini-triage' is added
  gemini-triage:
    if: |
      (github.event_name == 'issues') && 
      (
        github.event.action == 'opened' || 
        (github.event.action == 'labeled' && github.event.label.name == 'gemini-triage')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gemini Issue Triage
        uses: google-github-actions/run-gemini-cli@v1
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          command: 'triage'

  # 3. Interactive Chat (@gemini-cli)
  gemini-chat:
    if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '@gemini-cli')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gemini Chat
        uses: google-github-actions/run-gemini-cli@v1
        with:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          command: 'chat'
          issue_number: ${{ github.event.issue.number }}
          comment_body: ${{ github.event.comment.body }}
