stages:
  - lint
  - test
  - e2e
  - build
  - release

default:
  interruptible: true

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  PLAYWRIGHT_BROWSERS_PATH: "0"
  GOMODCACHE: "$CI_PROJECT_DIR/.cache/go/pkg/mod"
  GOCACHE: "$CI_PROJECT_DIR/.cache/go/build"
  npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/

go:lint:
  stage: lint
  image: golangci/golangci-lint:v1.64.6
  script:
    - mkdir -p frontend/dist
    - golangci-lint run ./...

go:test:
  stage: test
  image: golang:1.24
  script:
    - mkdir -p frontend/dist
    - go test ./...

frontend:lint:
  stage: lint
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run lint

frontend:typecheck:
  stage: test
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run type-check

playwright:smoke:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.48.2-jammy
  script:
    - cd frontend
    - npm ci
    - npm run test:e2e

wails:build-linux:
  stage: build
  image: golang:1.24
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates curl git pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y --no-install-recommends nodejs
    - npm --version
    - node --version
    - go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
    - mkdir -p frontend/dist
    - (cd frontend && npm ci && npm run build && touch dist/.keep)
    - wails build -platform linux/amd64 -clean
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - build/bin/

wails:build-windows:
  stage: build
  image: golang:1.24
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates curl git mingw-w64
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y --no-install-recommends nodejs
    - go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0
    - mkdir -p frontend/dist
    - (cd frontend && npm ci && npm run build && touch dist/.keep)
    - wails build -platform windows/amd64 -clean
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - build/bin/

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+.*$/
  script:
    - echo "Creating GitLab Release for $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "$CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
