version: '3'

tasks:
  setup:
    desc: Install dependencies and setup environment
    cmds:
      - mise install
      - go mod download
      - npm install --prefix frontend
      - pre-commit install

  dev:
    desc: Run the application in development mode
    cmds:
      - wails dev

  lint:go:
    desc: Lint Go backend
    cmds:
      - golangci-lint run

  test:go:
    desc: Run Go backend tests
    cmds:
      - go test ./...

  lint:web:
    desc: Lint Web frontend (Biome)
    cmds:
      - npm --prefix frontend exec -- biome check frontend/src frontend/vite.config.ts

  type-check:
    desc: Type-check Web frontend (TypeScript)
    cmds:
      - npm run type-check --prefix frontend

  lint:
    desc: Run all linters and checks
    cmds:
      - task: lint:go
      - task: lint:web
      - task: type-check
      - task: test:go
